# =====================================================================
# BrainFlow Direct — Flow Matching in fMRI Space
# =====================================================================
# No encoder — uses pre-extracted context latents (B, T, 512)
# Source: x_0 ~ N(0, I), Target: raw fMRI 1000-dim
# VelocityNet: FiLM (time) + CrossAttn (context) per block
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 2
  # Global normalization stats (pre-computed per-voxel mean/std from train set)
  # Files: {fmri_dir}/{subject}/stats/global_mean.npy, global_std.npy
  use_global_stats: true

# --- Pre-extracted encoder context latents ---
# Shape per clip: (n_trs, 512)
context_latent_dir: Data/dae_latents
context_dim: 512

# --- Multi-subject training ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Sliding window ---
sliding_window:
  feature_context_trs: 10
  stride: 1
  temporal_jitter: 2

# --- DataLoader ---
dataloader:
  batch_size: 512
  val_batch_size: 512
  num_workers: 4
  pin_memory: true

# =====================================================================
# Model config
# =====================================================================
brainflow:
  output_dim: 1000

  # Velocity network: FiLM + CrossAttn per block
  velocity_net:
    output_dim: 1000
    hidden_dim: 1024
    context_dim: 512
    n_blocks: 8
    n_heads: 8
    dropout: 0.1

# =====================================================================
# Solver args (validation inference)
# =====================================================================
solver_args:
  method: euler
  time_points: 20

# =====================================================================
# Training
# =====================================================================
training:
  n_epochs: 200
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5
  ema_decay: 0.999

# --- Output ---
output_dir: outputs/brainflow_direct
