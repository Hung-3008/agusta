# =====================================================================
# Multimodal Deterministic Autoencoder (DAE)
# =====================================================================
# No KL, no β annealing — reconstruction loss only.
# Uses pre-pooled NPY features (mean-pooled per timestep).
# =====================================================================

data_root: Data

# --- Features (pre-pooled NPY) ---
features_dir: Data/features_npy_pooled
data_mode: npy

modalities:
  video:
    subdir: vjepa2_avg_feat
    dim: 1408
  audio:
    subdir: whisper
    dim: 1280
  text_1b:
    subdir: Llama-3.2-1B
    dim: 2048
  text_3b:
    subdir: Llama-3.2-3B
    dim: 3072
  omni:
    subdir: qwen-2-5-omni-7b
    dim: 3584
  vlm_14b:
    subdir: InternVL3_14B
    dim: 5120
  vlm_8b:
    subdir: internvl3_8b_8bit
    dim: 3584
  text_qw:
    subdir: qwen2-5_3B
    dim: 2048

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Model ---
model:
  latent_dim: 512
  encoder_hidden: 1024
  n_experts: 4
  expert_hidden: 1024
  decoder_hidden: 1024
  dropout: 0.1

# --- DataLoader ---
dataloader:
  batch_size: 512
  val_batch_size: 512
  num_workers: 0
  pin_memory: true
  stride: 1

# --- Training ---
training:
  n_epochs: 200
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5
  ema_decay: 0.999

# --- Output ---
output_dir: outputs/multimodal_dae
