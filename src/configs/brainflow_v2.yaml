data:
  root: Data/algonauts_2025.competitors
  features_dir: Data/features
  subject: subj01
  # Multimodal features configs
  context_duration: 14.9  # seconds (10 TRs)
  stride: 1.49            # seconds (1 TR)
  modalities:
    - video
    - audio
    - text
    - omni

dataloader:
  batch_size: 256
  num_workers: 0

model:
  n_voxels: 1000
  patch_size: 100
  hidden_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.1
  drop_path_rate: 0.1
  # Multimodal Feature Encoder
  use_multimodal_features: true
  feature_dims:
    video: 1408       # V-JEPA2 last layer
    audio: 1024       # Wav2VecBert last layer
    text: 3072        # LLaMA3.2 last layer
    omni: 3584        # Qwen2.5-Omni (5 tokens/TR, kept individually)
  encoder_dim: 1024
  encoder_depth: 2
  encoder_heads: 8
  feature_patches: 4            # Split each non-omni feature D into 4 patches/TR
  omni_keep_tokens: true        # Keep all 5 omni tokens per TR (no mean-pool)
  cond_dim: 1024

training:
  batch_size: 512
  lr: 0.0003
  encoder_lr: 0.0001      # Adjust for transformer encoder
  num_epochs: 300
  warmup_epochs: 20
  grad_clip: 1.0
  weight_decay: 0.1
  ema_decay: 0.99
  use_ema: true
  eval_interval: 10    # evaluate every 10 epochs (was 5, saves ~14min per 5ep)
  patience: 40
  save_every: 50

  # Flow matching
  use_ot: false         # ExactOT disabled: KeOps has no CUDA → CPU bottleneck
  sigma: 0.05
  timestep_sampling: logit_normal
  logit_normal_mu: 0.0
  logit_normal_sigma: 1.0

  # DGS (Dynamic Guidance Switching)
  cfg_drop_prob: 0.4
  cfg_scale: 1.0

  # Sampling — ode_steps=20 during training (fast trend monitoring)
  # Use 100+ steps only for final evaluation after training
  ode_steps: 20
  num_trials: 1
  sampler: ode
  log_interval: 200      # print progress every N batches

  # Velocity loss
  velocity_loss_type: pseudo_huber
  huber_c: 0.1
  timestep_weight_type: cosine

  # Per-ROI soft target (Bypassed since dataset is continuous)
  use_per_roi_soft_target: false



output_dir: results/subj01/brainflow_v2
