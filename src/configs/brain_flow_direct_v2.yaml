# =====================================================================
# BrainFlow Direct V2 — End-to-End Flow Matching with Raw Features
# =====================================================================
# No DAE bottleneck — loads raw multimodal features directly.
# Self-attention over [x_t, context] tokens with adaLN time conditioning.
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 5
  use_global_stats: true

# --- Raw multimodal features (multilayer NPY) ---
features_dir: Data/features_npy_multilayer
modalities:
  video:
    subdir: vjepa2_avg_feat
    dim: 1408
    layers: 13
  audio:
    subdir: whisper
    dim: 1280
    layers: 4
  text_3b:
    subdir: Llama-3.2-3B
    dim: 3072
    layers: 5
  omni:
    subdir: qwen-2-5-omni-7b
    dim: 3584
    layers: 9

# --- Multiple subjects ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Sliding window ---
sliding_window:
  feature_context_trs: 10
  stride: 1
  temporal_jitter: 2

# --- DataLoader ---
dataloader:
  batch_size: 512
  val_batch_size: 512
  num_workers: 0    # Must be 0 for LRUCache memory sharing
  pin_memory: true
  max_cache_gb: 30.0

# =====================================================================
# Model config
# =====================================================================
brainflow:
  output_dim: 1000

  velocity_net:
    output_dim: 1000
    hidden_dim: 1024
    n_blocks: 8
    n_heads: 16
    ff_mult: 4
    dropout: 0.15
    drop_path: 0.1
    modality_dropout: 0.2
    max_seq_len: 20
    n_subjects: 10

# =====================================================================
# Solver args (validation inference)
# =====================================================================
solver_args:
  method: euler
  time_points: 20

# =====================================================================
# Training
# =====================================================================
training:
  n_epochs: 200
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5
  ema_decay: 0.999

# --- Output ---
output_dir: outputs/brainflow_direct_v2_1
