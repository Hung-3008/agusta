# =====================================================================
# BrainFlow v4: Latent-Space Conditional Flow Matching
# =====================================================================
# Stage 2 of the fMRI generation pipeline:
#   PCA features + online VAE latent → velocity transformer → ODE → latent
#   → frozen VAE decoder → fMRI
# =====================================================================

# --- Data paths (relative to project root) ---
data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5

features:
  dir: algonauts_2025.features
  sample_freq: 2.0
  layer_aggregation: last

  modalities:
    video:
      subdir: vjepa2_avg_feat
      file_format: per_clip
      dim: 1408
    audio:
      subdir: whisper
      file_format: per_clip
      dim: 1280
    text:
      subdir: Llama-3.2-3B
      file_format: per_clip
      dim: 3072

# --- PCA feature preprocessing config ---
pca_features:
  output_dir: Data/pca_features
  n_components: 250
  hrf_delay: 3
  stimulus_window: 5
  modalities:
    - video
    - audio
    - text

# --- Subjects ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test: [s7]
  movie10:
    train: [bourne, figures, life, wolf]
    test: []

val_ratio: 0.1

# --- Preprocessing ---
preprocessing:
  fmri:
    standardize: none

# --- DataLoader ---
dataloader:
  batch_size: 64
  val_batch_size: 64
  num_workers: 0
  pin_memory: true

# --- BrainFlow v4 specific ---
brainflow:
  seq_len: 10          # Number of TRs per sample (~15s)
  train_stride: 1      # Dense overlap for training
  num_trial: 1         # VAE encoding trials (1=deterministic mu, >1=avg samples)

# =====================================================================
# Model config (BrainFlowCFM_v4 constructor args)
# =====================================================================
model:
  latent_dim: 256        # VAE latent dimension
  cond_dim: 2750         # 250*5 (video) + 250*5 (audio) + 250*1 (text) = 1250+1250+250
  hidden_dim: 512        # Transformer d_model
  n_heads: 8             # Attention heads (512/8 = 64 dim/head)
  n_layers: 6            # Transformer layers
  n_subjects: 1          # Number of subjects (single subject mode)
  dropout: 0.1
  time_embed_dim: 256

# =====================================================================
# VAE checkpoint (Stage 1, frozen decoder for validation)
# =====================================================================
vae_checkpoint: outputs/fmri_vae_128/best.pt

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 200
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  grad_clip: 1.0
  ema_decay: 0.999
  cfm_sigma: 0.01
  cfm_method: icfm

  use_amp: true
  log_every_n_steps: 50
  val_every_n_epochs: 5

  # Inference / sampling during validation
  n_sample_steps: 20
  sample_method: euler

# --- Output ---
output_dir: outputs/brainflow_v4
