# =============================================================================
# Data configuration for SlidingWindowDataset
# =============================================================================

data_root: Data/algonauts_2025.competitors

# fMRI parameters
fmri:
  dir: fmri                           # relative to data_root
  tr: 1.49                            # Repetition time in seconds
  n_voxels: 1000                      # Number of voxels (Schaefer 1000 parcels)

# Feature extraction parameters
features:
  dir: ../features                     # relative to data_root → Data/features
  npy_dir: ../features_npy             # activated: faster np.load() vs h5py
  sample_freq: 2.0                     # Features extracted at 2 Hz (except omni which is per-TR)

  # layer_aggregation: how to reduce across the layers dimension
  # Options: "last" (use last layer), "mean" (mean across layers)
  layer_aggregation: last

  modalities:
    video:
      subdir: video
      file_pattern: "{movie_type}_{stimulus_type}_features_vjepa2.h5"
      h5_key: video
      dim: 1408                        # dim of last layer (41 layers total)
    audio:
      subdir: audio
      file_pattern: "{movie_type}_{stimulus_type}_features_w2vbert.h5"
      h5_key: audio
      dim: 1024                        # dim of last layer (25 layers total)
    text:
      subdir: text
      file_pattern: "{movie_type}_{stimulus_type}_features_llama3.h5"
      h5_key: text
      dim: 3072                        # dim of last layer (29 layers total)
    omni:
      subdir: omni
      file_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni.h5"
      h5_key: omni
      dim: 3584                        # dim per token
      n_tokens: 5                      # tokens per TR from Qwen Omni
      keep_tokens: true                # keep all 5 tokens per TR (no mean-pooling)
      data_format: tr_tokens_dim       # special: shape is (n_trs, n_tokens, dim) not (n_layers, dim, n_trs)
      sample_freq: tr                  # sampled at TR not 2Hz

# Sliding window parameters
sliding_window:
  context_duration: 14.9              # seconds (10 TRs)
  stride: 1.49                        # seconds (1 TR)

# Subjects available
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

# Train / val / test splits
# Stimulus files are grouped by task → split → stimulus_type
splits:
  friends:
    train:
      - s1
      - s2
      - s3
      - s4
      - s5
      - s6
    test:
      - s7

val_ratio: 0.1  # 10% of train is used as val (deterministic / hash-based)

# Preprocessing
preprocessing:
  fmri:
    standardize: zscore_sample

# DataLoader
dataloader:
  batch_size: 48
  num_workers: 0     # 0 = single-process; avoids LRU cache duplication across workers
  max_cache_gb: 10.0 # max RAM for LRU feature+fMRI cache (GB)
  pin_memory: true
  prefetch_factor: 2
