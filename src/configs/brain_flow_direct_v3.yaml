# =====================================================================
# BrainFlow Direct v3 — Flow Matching + Aux Regression + CFG
# =====================================================================
# LinearFusion → Temporal Self-Attention → Aux Regression Head
# 4 SimpleFiLMBlocks, Gaussian source, OT-CFM
# CFG inference support (trained with 10% context dropout)
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 2
  use_global_stats: true

# --- Pre-extracted encoder context latents (8 modalities) ---
context_latent_dirs:
  - Data/features_npy_pooled/vjepa2_avg_feat       # Visual (V-JEPA 2)
  - Data/features_npy_pooled/whisper                # Audio (Whisper)
  - Data/features_npy_pooled/Llama-3.2-1B           # Text (LLaMA-1B)
  - Data/features_npy_pooled/Llama-3.2-3B           # Text (LLaMA-3B)
  - Data/features_npy_pooled/qwen2-5_3B             # Text (Qwen2.5-3B)
  - Data/features_npy_pooled/qwen-2-5-omni-7b       # Multimodal (Qwen-Omni)
  - Data/features_npy_pooled/internvl3_8b_8bit      # Vision-Language (InternVL3-8B)
  - Data/features_npy_pooled/InternVL3_14B          # Vision-Language (InternVL3-14B)

modality_dims:
  - 1408   # vjepa2_avg_feat
  - 1280   # whisper
  - 2048   # Llama-3.2-1B
  - 3072   # Llama-3.2-3B
  - 2048   # qwen2-5_3B
  - 3584   # qwen-2-5-omni-7b
  - 3584   # internvl3_8b_8bit
  - 5120   # InternVL3_14B

# --- Multi-subject training ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Sliding window ---
sliding_window:
  feature_context_trs: 30     # Expanded from 10 → 30 (#4)
  stride: 1
  temporal_jitter: 2

# --- DataLoader ---
dataloader:
  batch_size: 512
  val_batch_size: 512
  num_workers: 4
  pin_memory: true

# =====================================================================
# Model config — V3 with improvements
# =====================================================================
model_version: v3

brainflow:
  output_dim: 1000
  reg_weight: 0.5              # Auxiliary regression loss weight (#1)

  velocity_net:
    output_dim: 1000
    hidden_dim: 1024
    proj_dim: 256
    n_blocks: 4
    n_heads: 8
    dropout: 0.1
    modality_dropout: 0.3
    max_seq_len: 31            # 30 past + 1 current (#4)
    temporal_attn_layers: 2    # Temporal self-attention (#5)

# =====================================================================
# Solver args (validation inference)
# =====================================================================
solver_args:
  method: midpoint             # More accurate than euler
  time_points: 50              # More steps for better accuracy (#3)
  cfg_scale: 0.0               # CFG at inference (0 = disabled) (#3)

# =====================================================================
# Training
# =====================================================================
training:
  n_epochs: 200
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 10
  ema_decay: 0.999

# --- Output ---
output_dir: outputs/brainflow_direct_v3
