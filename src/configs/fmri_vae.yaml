# =====================================================================
# fMRI VAE — Single Subject (sub-01), No Subject Conditioning
# =====================================================================
# Simplified training: 1 subject, no subject embed, pure fMRI autoencoder.
# Run: python src/train_fmri_vae.py --config src/configs/fmri_vae_single.yaml
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5

features:
  dir: features
  npy_dir: features_npy_cat
  npy_only: true
  sample_freq: 2.0
  layer_aggregation: cat
  modalities:
    video:
      subdir: video
      file_pattern: "{movie_type}_{stimulus_type}_features_vjepa2.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_vjepa2"
      h5_key: video
      dim: 5632
    audio:
      subdir: audio
      file_pattern: "{movie_type}_{stimulus_type}_features_w2vbert.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_w2vbert"
      h5_key: audio
      dim: 4096
    text:
      subdir: text
      file_pattern: "{movie_type}_{stimulus_type}_features_llama3.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_llama3"
      h5_key: text
      dim: 12288
    omni:
      subdir: omni
      file_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni"
      h5_key: omni
      data_format: tr_tokens_dim
      dim: 3584
      keep_tokens: false

# --- Single subject ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test: [s7]
  movie10:
    train: [all]
    test: []

val_ratio: 0.1

sliding_window:
  context_duration: 14.9
  stride: 1.49

# --- Preprocessing ---
preprocessing:
  fmri:
    standardize: none   # raw data already z-scored by dataset providers

# --- DataLoader ---
dataloader:
  batch_size: 128
  val_batch_size: 128
  num_workers: 0
  pin_memory: true

# =====================================================================
# VAE config — TCN (v5)
# =====================================================================
vae:
  version: 5
  latent_dim: 64
  seq_len: 100

  # No subject conditioning — treat as pure autoencoder
  use_subject: false
  subject_embed_dim: 64

  # TCN v5 hyperparams
  hidden_dim: 256
  num_res_blocks: 4
  dropout: 0.25

  # === Loss Settings ===
  lambda_pcc: 1.0
  pcc_warmstart_epochs: 10

  # KL regularization — smooth latent space for Flow Matching
  free_bits: 1.0
  beta_max: 0.1

  # Augmentation for overfitting prevention
  mask_ratio: 0.2
  beta_warmup_epochs: 50
  window_stride: 50          # 50% overlap → 2× data

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 500
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  grad_clip: 1.0
  ema_decay: 0.99
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5

# --- Output ---
vae_output_dir: outputs/fmri_vae_64
