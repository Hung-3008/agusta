# =====================================================================
# fMRI VAE (v5 Temporal TCN) 
# Trains a multi-subject VAE to compress 1000-D fMRI into 64-D Latents
# Run: python src/train_fmri_vae.py --config src/configs/fmri_vae.yaml
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5

# --- Multi subject ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test: [s7]
  movie10:
    train: [all]
    test: []

val_ratio: 0.1

# --- Preprocessing ---
preprocessing:
  fmri:
    standardize: none   # raw data already z-scored by dataset providers

# --- DataLoader ---
dataloader:
  batch_size: 128
  val_batch_size: 256
  num_workers: 0
  pin_memory: true

# =====================================================================
# VAE config — TCN (v5)
# =====================================================================
vae:
  version: 5
  latent_dim: 64
  seq_len: 100

  # Multi-subject conditioning
  use_subject: true
  subject_embed_dim: 64

  # TCN v5 hyperparams
  hidden_dim: 256
  num_res_blocks: 4
  dropout: 0.25

  # === Loss Settings ===
  lambda_pcc: 1.0
  pcc_warmstart_epochs: 10

  # KL regularization — smooth latent space for Flow Matching
  free_bits: 1.0
  beta_max: 0.1

  # Augmentation for overfitting prevention
  mask_ratio: 0.2
  beta_warmup_epochs: 50
  window_stride: 50          # 50% overlap → 2× data

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 500
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  grad_clip: 1.0
  ema_decay: 0.99
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5

# --- Output ---
vae_output_dir: outputs/fmri_vae_64
