# ═══════════════════════════════════════════════════════════════════════════════
# BrainFlow — Unified Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# ── Data ──
data_root: Data/algonauts_2025.competitors

fmri:
  dir: fmri
  tr: 1.49
  n_voxels: 1000

features:
  dir: ../features
  npy_dir: ../features_npy
  sample_freq: 2.0
  layer_aggregation: last
  modalities:
    video:
      subdir: video
      file_pattern: "{movie_type}_{stimulus_type}_features_vjepa2.h5"
      h5_key: video
      dim: 1408
    audio:
      subdir: audio
      file_pattern: "{movie_type}_{stimulus_type}_features_w2vbert.h5"
      h5_key: audio
      dim: 1024
    text:
      subdir: text
      file_pattern: "{movie_type}_{stimulus_type}_features_llama3.h5"
      h5_key: text
      dim: 3072
    omni:
      subdir: omni
      file_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni.h5"
      h5_key: omni
      dim: 3584
      n_tokens: 5
      keep_tokens: true
      data_format: tr_tokens_dim
      sample_freq: tr

sliding_window:
  context_duration: 14.9
  stride: 1.49

subjects:
  - sub-01

splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test: [s7]

val_ratio: 0.1

preprocessing:
  fmri:
    standardize: zscore_sample

# ── Model ──
model:
  n_voxels: 1000
  patch_size: 100
  hidden_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.1
  drop_path_rate: 0.1
  feature_dims:
    video: 1408
    audio: 1024
    text: 3072
    omni: 3584
  encoder_dim: 1024
  encoder_depth: 2
  encoder_heads: 8
  feature_patches: 4
  cond_dim: 1024

# ── Training ──
training:
  batch_size: 512
  lr: 0.0003
  encoder_lr: 0.0001
  num_epochs: 300
  warmup_epochs: 20
  grad_clip: 1.0
  weight_decay: 0.1
  ema_decay: 0.99
  use_ema: true
  eval_interval: 10
  patience: 40
  save_every: 50

  # Flow matching
  use_ot: false
  sigma: 0.05
  timestep_sampling: logit_normal
  logit_normal_mu: 0.0
  logit_normal_sigma: 1.0

  # DGS (Dynamic Guidance Switching)
  cfg_drop_prob: 0.4
  cfg_scale: 1.0

  # Sampling
  ode_steps: 20
  num_trials: 1
  sampler: ode
  log_interval: 200

  # Velocity loss
  velocity_loss_type: pseudo_huber
  huber_c: 0.1
  timestep_weight_type: cosine

# ── DataLoader ──
dataloader:
  num_workers: 0
  max_cache_gb: 10.0
  pin_memory: true
  prefetch_factor: 2

output_dir: results/subj01/brainflow
