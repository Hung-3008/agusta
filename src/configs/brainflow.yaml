# =====================================================================
# BrainFlow V2: Feature-Prior Conditional Flow Matching
# =====================================================================

# ── Data paths ────────────────────────────────────────────────────────
data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000

features:
  root: algonauts_2025.features
  layer_agg: mean        # "mean" | "last"

  # Available models — shape (T, dim) after layer aggregation
  modalities:
    vjepa2:
      path: vjepa2_avg_feat
      dim: 1408
      squeeze: true      # raw shape (T, 1, 1408) → squeeze → (T, 1408)
      layers:            # null = all layers in H5

    qwen_omni:
      path: qwen-2-5-omni-7b
      dim: 3584
      squeeze: false     # raw shape (T, 3584)
      layers:

    whisper:
      path: whisper
      dim: 1280
      squeeze: true      # raw shape (T, 1, 1280) → squeeze → (T, 1280)
      layers:

    llama3b:
      path: Llama-3.2-3B
      dim: 3072
      squeeze: false     # raw shape (T, 3072)
      layers:

# ── Subjects ──────────────────────────────────────────────────────────
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

# ── Train/val/test splits ─────────────────────────────────────────────
splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test:  [s7]

val_ratio: 0.1

# ── Sliding window ────────────────────────────────────────────────────
sliding_window:
  context_duration: 14.9   # seconds (~10 TRs at TR=1.49s)
  stride: 1.49             # 1 TR stride

# ── Preprocessing ─────────────────────────────────────────────────────
preprocessing:
  fmri:
    standardize: zscore_sample

# ── DataLoader ────────────────────────────────────────────────────────
dataloader:
  batch_size: 512
  val_batch_size: 512
  num_workers: 0       # H5py is not fork-safe — use 0 or preload_to_ram
  max_cache_gb: 10.0
  pin_memory: false    # must be false when num_workers=0

# ── Model ─────────────────────────────────────────────────────────────
model:
  # FeaturePriorEncoder
  modality_dims:
    vjepa2: 1408
    qwen_omni: 3584
    whisper: 1280
    llama3b: 3072
  proj_dim: 512            # per-modality projection
  hidden_dim: 1024         # cross-modal + temporal Transformer
  n_encoder_layers: 4
  n_heads: 8
  modality_dropout: 0.2

  # VelocityRefiner
  n_voxels: 1000
  refiner_hidden_dim: 1024
  n_refiner_blocks: 4
  time_embed_dim: 256
  n_subjects: 4
  dropout: 0.1

# ── Training ──────────────────────────────────────────────────────────
training:
  n_epochs: 300
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  grad_clip: 1.0
  ema_decay: 0.999

  # Flow matching
  cfm_method: icfm        # icfm = straight-line CFM, O(1) per batch
                          # otcfm is O(n³) Hungarian matching — extremely slow at bs=256
                          # icfm is correct here since x0[i] already paired with x1[i]
  cfm_sigma: 0.0

  # Auxiliary prior loss weight: loss = cfm_loss + λ * prior_loss
  lambda_prior: 0.5

  # Mixed precision
  use_amp: true

  # RAM preloading (eliminates HDD I/O)
  preload_to_ram: false

  # Logging & evaluation
  log_every_n_steps: 50
  val_every_n_epochs: 5
  n_sample_steps: 20       # ODE integration steps
  sample_method: euler     # euler | midpoint

# ── Output ────────────────────────────────────────────────────────────
output_dir: outputs/brainflow_v2
