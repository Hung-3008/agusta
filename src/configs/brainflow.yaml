# =====================================================================
# BrainFlow: Conditional Flow Matching for fMRI generation
# =====================================================================
# Data configuration for SlidingWindowDataset
# Model + Training hyperparameters
# =====================================================================

# --- Data paths (relative to project root) ---
data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5      # Match baseline: skip first 5 TRs (HRF not stable)
  excluded_samples_end: 5        # Match baseline: skip last 5 TRs (movie may end early)

features:
  dir: algonauts_2025.features   # Per-clip H5 features from HuggingFace
  sample_freq: 2.0               # extraction rate for unimodal features
  layer_aggregation: last         # last | mean | cat

  modalities:
    video:
      subdir: vjepa2_avg_feat
      file_format: per_clip       # 1 H5 per clip at {subdir}/{task}/{stim_type}/{clip}.h5
      dim: 1408                   # single layer dim (vjepa2 encoder hidden)
    audio:
      subdir: whisper
      file_format: per_clip
      dim: 1280                   # whisper encoder hidden
    text:
      subdir: Llama-3.2-3B
      file_format: per_clip
      dim: 3072                   # llama hidden dim
    omni:
      subdir: qwen-2-5-omni-7b
      file_format: per_clip
      dim: 3584                   # qwen-omni hidden dim

# --- Subjects ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: single     # 'single' or 'avg'

# --- Splits (matching baseline: Friends s1-s6 + Movie10 for train) ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test: [s7]
  movie10:
    train: [bourne, figures, life, wolf]
    test: []

val_ratio: 0.1

# --- Sliding window ---
sliding_window:
  context_duration: 14.9   # seconds (~10 TRs)
  stride: 1.49             # seconds (1 TR stride)

# --- Preprocessing ---
preprocessing:
  fmri:
    standardize: none      # Match baseline: use raw fMRI (no z-score)

# --- DataLoader ---
dataloader:
  batch_size: 512
  val_batch_size: 512
  num_workers: 0
  max_cache_gb: 12.0
  pin_memory: true
  prefetch_factor: 2

# =====================================================================
# Model config
# =====================================================================
model:
  # Feature Encoder
  modality_dims:
    video: 1408
    audio: 1280
    text: 3072
    omni: 3584
  encoder_hidden_dim: 2048
  n_transformer_layers: 6
  n_heads: 8
  modality_dropout: 0.3

  # Velocity Network
  n_voxels: 1000
  velocity_hidden_dim: 1024
  n_velocity_blocks: 8
  time_embed_dim: 256
  n_subjects: 4
  dropout: 0.1

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 300
  lr: 3.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  grad_clip: 1.0
  ema_decay: 0.999
  cfm_sigma: 0.01          # i-CFM noise level
  cfm_method: icfm          # icfm: standard independent CFM

  # Mixed precision
  use_amp: true

  # Preload data to RAM (eliminates HDD I/O)
  preload_to_ram: true

  # Logging
  log_every_n_steps: 50
  val_every_n_epochs: 10
  save_top_k: 3

  # Inference / sampling during validation
  n_sample_steps: 20          # ODE integration steps
  sample_method: euler         # euler | midpoint

# --- Output ---
output_dir: outputs/brainflow
