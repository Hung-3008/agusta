# =====================================================================
# BrainFlow Seq2Seq v5 — 101 TR → slice 50 TR + 1D-DiT velocity (AdaLN-Zero)
# =====================================================================
# Encoder:  Linear(D_total,H)→LN→GELU → RoPE Transformer (no mask) → (B,101,H)
#           Temporal slice [T_past:T_past+50] with T_past=(101-50)//2 → (B,50,H)
# Decoder:  x_t_emb + context_50 → DiT blocks (RoPE self-attn, AdaLN-Zero) → 7 net heads
# Reg head:  pool(detach) over 50 context steps → temporal-mean fMRI anchor
# Legacy:   set context_encoder: multitoken, use_dit_decoder: false (FiLM + cross-attn)
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 2
  use_global_stats: true

# --- Pre-extracted encoder context latents (10 modalities) ---
context_latent_dirs:
  - Data/features_npy_pooled/vjepa2_avg_feat       # Visual (V-JEPA 2)
  - Data/features_npy_pooled/whisper                # Audio (Whisper)
  - Data/features_npy_pooled/Llama-3.2-1B           # Text (LLaMA-1B)
  - Data/features_npy_pooled/Llama-3.2-3B           # Text (LLaMA-3B)
  - Data/features_npy_pooled/qwen2-5_3B             # Text (Qwen2.5-3B)
  - Data/features_npy_pooled/qwen-2-5-omni-7b       # Multimodal (Qwen-Omni)
  - Data/features_npy_pooled/internvl3_8b_8bit      # Vision-Language (InternVL3-8B)
  - Data/features_npy_pooled/InternVL3_14B          # Vision-Language (InternVL3-14B)
  - Data/features_npy_pooled/dinov2_giant            # Visual (DINOv2-giant)
  - Data/features_npy_pooled/vlm2vec_7b              # Vision-Language (VLM2Vec-7B)

modality_dims:
  - 1408   # [0] vjepa2_avg_feat
  - 1280   # [1] whisper
  - 2048   # [2] Llama-3.2-1B
  - 3072   # [3] Llama-3.2-3B
  - 2048   # [4] qwen2-5_3B
  - 3584   # [5] qwen-2-5-omni-7b
  - 3584   # [6] internvl3_8b_8bit
  - 5120   # [7] InternVL3_14B
  - 6144   # [8] dinov2_giant (4 × 1536)
  - 3584   # [9] vlm2vec_7b

# --- Multi-subject training ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Seq2Seq sliding window ---
# Context: 101 TRs = 25 past-buffer + 50 target + 26 future-buffer (+ HRF shift)
# Each sample: context (101, D) → fMRI sequence (50, V)
sliding_window:
  context_trs: 101         # total context window length fed to encoder
  n_target_trs: 50         # simultaneous fMRI TRs predicted (decoder output)
  stride: 10               # step between target window starts (10 TR → 80% overlap)
  temporal_jitter: 2       # ±2 TR jitter for context (train only)

# --- DataLoader ---
dataloader:
  batch_size: 256
  val_batch_size: 256
  num_workers: 0
  pin_memory: true

# =====================================================================
# Model config — Seq2Seq v5 (1D-DiT + temporal slicing)
# =====================================================================
model_version: v5

brainflow:
  output_dim: 1000
  reg_weight: 0.5              # Reg head: predict temporal-mean fMRI
  cont_weight: 0.0             # InfoNCE off by default (less auxiliary noise)
  cont_dim: 256
  # InDI Flow Matching over 50-TR sequence
  indi_flow_matching: true
  indi_train_time_sqrt: false
  indi_min_denom: 1.0e-3

  velocity_net:
    output_dim: 1000
    hidden_dim: 1024
    proj_dim: 256              # multitoken legacy only
    n_blocks: 4                # legacy FiLM depth (if use_dit_decoder: false)
    dit_num_blocks: 4          # 1D-DiT blocks (seq2seq)
    n_heads: 8
    dropout: 0.1
    modality_dropout: 0.0      # unused with context_encoder: flat; CFG 10% replaces modality dropout
    max_seq_len: 101           # encoder RoPE / fusion cap (multitoken)
    context_trs: 101           # must match sliding_window.context_trs (slice centering)
    n_target_trs: 50
    temporal_attn_layers: 2    # encoder temporal self-attention (2–4 typical)
    gradient_checkpointing: true
    fusion_mode: concat        # multitoken only
    fusion_proj_dim: 384
    use_subject_head: true
    network_head: true
    use_rope: true
    latent_dim: 1024
    # v5 defaults
    context_encoder: flat      # flat | multitoken
    use_dit_decoder: true
    zero_init_network_heads: true

# =====================================================================
# Solver args (validation inference)
# =====================================================================
solver_args:
  method: midpoint
  time_points: 50
  cfg_scale: 0.0
  temperature: 0.1
  time_grid_warp: sqrt

# =====================================================================
# Training
# =====================================================================
training:
  n_epochs: 200
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 10
  ema_decay: 0.999
  gradient_accumulation_steps: 4   # effective = 8 × 4 = 32 samples = 1600 fMRI/step
  ema_on_cpu: true
  context_bf16_when_amp: true
  empty_cuda_cache_each_epoch: false

# --- Output ---
output_dir: outputs/brainflow_seq2seq_v5
