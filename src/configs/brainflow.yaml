# =====================================================================
# BrainFlow Direct v3 — Flow Matching + Aux Regression + CFG
# =====================================================================
# LinearFusion → Temporal Self-Attention → Aux Regression Head
# 4 SimpleFiLMBlocks, Gaussian source, OT-CFM
# CFG inference support (trained with 10% context dropout)
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 2
  use_global_stats: true

# --- Pre-extracted encoder context latents (10 modalities) ---
context_latent_dirs:
  - Data/features_npy_pooled/vjepa2_avg_feat       # Visual (V-JEPA 2)
  - Data/features_npy_pooled/whisper                # Audio (Whisper)
  - Data/features_npy_pooled/Llama-3.2-1B           # Text (LLaMA-1B)
  - Data/features_npy_pooled/Llama-3.2-3B           # Text (LLaMA-3B)
  - Data/features_npy_pooled/qwen2-5_3B             # Text (Qwen2.5-3B)
  - Data/features_npy_pooled/qwen-2-5-omni-7b       # Multimodal (Qwen-Omni)
  - Data/features_npy_pooled/internvl3_8b_8bit      # Vision-Language (InternVL3-8B)
  - Data/features_npy_pooled/InternVL3_14B          # Vision-Language (InternVL3-14B)
  - Data/features_npy_pooled/dinov2_giant            # Visual (DINOv2-giant multiplexed)
  - Data/features_npy_pooled/vlm2vec_7b              # Vision-Language (VLM2Vec-7B)

modality_dims:
  - 1408   # [0] vjepa2_avg_feat
  - 1280   # [1] whisper
  - 2048   # [2] Llama-3.2-1B
  - 3072   # [3] Llama-3.2-3B
  - 2048   # [4] qwen2-5_3B
  - 3584   # [5] qwen-2-5-omni-7b
  - 3584   # [6] internvl3_8b_8bit
  - 5120   # [7] InternVL3_14B
  - 6144   # [8] dinov2_giant (4 × 1536)
  - 3584   # [9] vlm2vec_7b

# --- Multi-subject training ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Sliding window ---
sliding_window:
  feature_context_trs: 30     # 0: no context
  stride: 1
  temporal_jitter: 2

# --- DataLoader ---
dataloader:
  batch_size: 512
  val_batch_size: 512
  num_workers: 4
  pin_memory: true

# =====================================================================
# Model config — V3 with improvements
# =====================================================================
model_version: v1

brainflow:
  output_dim: 1000
  reg_weight: 0.5              # Auxiliary regression loss weight (#1)
  # InDI Flow Matching — Proposal C (OT path only; ignored if tensor_fm is set)
  indi_flow_matching: true
  indi_train_time_sqrt: false  # true: t = sqrt(U) for more training mass near t→1
  indi_min_denom: 1.0e-3       # u/(1-t) clamp at inference

  velocity_net:
    output_dim: 1000
    hidden_dim: 1024
    proj_dim: 256
    n_blocks: 4
    n_heads: 8
    dropout: 0.1
    modality_dropout: 0.3
    max_seq_len: 31            # 30 past + 1 current (#4)
    temporal_attn_layers: 2    # Temporal self-attention (#5)
    gradient_checkpointing: true   # less VRAM in backward (more compute)
    # Proposal A (TRIBE-style): concat fusion + shared latent + per-subject voxel head
    fusion_mode: concat         # "mean" = legacy average fusion (old checkpoints)
    fusion_proj_dim: 384
    use_subject_head: true
    latent_dim: 1024            # velocity/regression trunk ends here → SubjectLayers → voxels

# =====================================================================
# Solver args (validation inference)
# =====================================================================
solver_args:
  method: midpoint             # More accurate than euler
  time_points: 50              # More steps for better accuracy (#3)
  cfg_scale: 0.0               # CFG at inference (0 = disabled) (#3)
  temperature: 0.1             # Starting noise std: 0=deterministic, (0,1)=low-temp sampling
  time_grid_warp: sqrt          # finer Δt near t→1; pair with indi_flow_matching

# =====================================================================
# Training
# =====================================================================
training:
  n_epochs: 200
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 10
  ema_decay: 0.999
  # VRAM: effective batch ≈ batch_size × gradient_accumulation_steps
  gradient_accumulation_steps: 2
  ema_on_cpu: true                 # shadow weights on CPU (slower EMA update, less GPU)
  context_bf16_when_amp: true      # halve context/target footprint before forward
  empty_cuda_cache_each_epoch: false

# --- Output ---
output_dir: outputs/brainflow_direct_v3
