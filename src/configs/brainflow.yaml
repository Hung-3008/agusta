# =====================================================================
# BrainFlow: Conditional Flow Matching for fMRI generation
# =====================================================================
# Data configuration for SlidingWindowDataset
# Model + Training hyperparameters
# =====================================================================

# --- Data paths (relative to project root) ---
data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000

features:
  dir: features                    # H5 features (fallback)
  npy_dir: features_npy            # NPY features (primary, faster)
  npy_only: true                   # NPY-only mode: skip H5 entirely
  sample_freq: 2.0                 # extraction rate for unimodal features
  layer_aggregation: mean          # NPY already mean-pooled, this only applies to H5

  modalities:
    video:
      subdir: video
      file_pattern: "{movie_type}_{stimulus_type}_features_vjepa2.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_vjepa2"
      h5_key: video
      dim: 1408
    audio:
      subdir: audio
      file_pattern: "{movie_type}_{stimulus_type}_features_w2vbert.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_w2vbert"
      h5_key: audio
      dim: 1024
    text:
      subdir: text
      file_pattern: "{movie_type}_{stimulus_type}_features_llama3.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_llama3"
      h5_key: text
      dim: 3072
    omni:
      subdir: omni
      file_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni"
      h5_key: omni
      data_format: tr_tokens_dim
      dim: 3584
      keep_tokens: false   # mean-pool tokens → (1, 3584, n_trs)

# --- Subjects ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: single     # 'single' or 'avg'

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test: [s7]

val_ratio: 0.1

# --- Sliding window ---
sliding_window:
  context_duration: 14.9   # seconds (~10 TRs)
  stride: 1.49             # seconds (1 TR stride)

# --- Preprocessing ---
preprocessing:
  fmri:
    standardize: zscore_sample

# --- DataLoader ---
dataloader:
  batch_size: 256
  val_batch_size: 256
  num_workers: 0
  max_cache_gb: 12.0
  pin_memory: true
  prefetch_factor: 2

# =====================================================================
# Model config
# =====================================================================
model:
  # Feature Encoder
  modality_dims:
    video: 1408
    audio: 1024
    text: 3072
    omni: 3584
  encoder_hidden_dim: 1024
  n_transformer_layers: 4
  n_heads: 8
  modality_dropout: 0.3

  # Velocity Network
  n_voxels: 1000
  velocity_hidden_dim: 2048
  n_velocity_blocks: 8
  time_embed_dim: 256
  n_subjects: 4
  dropout: 0.1

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 300
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  grad_clip: 1.0
  ema_decay: 0.999
  cfm_sigma: 0.0           # OT-CFM noise level (0 = deterministic interpolant)
  cfm_method: otcfm         # otcfm | icfm | fm | si

  # Mixed precision
  use_amp: true

  # Preload data to RAM (eliminates HDD I/O)
  preload_to_ram: true

  # Logging
  log_every_n_steps: 50
  val_every_n_epochs: 10
  save_top_k: 3

  # Inference / sampling during validation
  n_sample_steps: 20          # ODE integration steps
  sample_method: euler         # euler | midpoint

# --- Output ---
output_dir: outputs/brainflow
