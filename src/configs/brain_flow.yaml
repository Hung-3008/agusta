# =====================================================================
# BrainFlow — Many-to-One Flow Matching
# =====================================================================
# Predicts 1 fMRI latent at time t from features of N past TRs + current TR.
# Input: 11 TRs of multimodal features → Output: 1 fMRI latent (64-dim)
# Run: python src/train_brainflow.py --config src/configs/brain_flow.yaml
# =====================================================================

data_root: Data
latent_dir: Data/latents_vae64
vae_checkpoint: outputs/fmri_vae_64/best.pt

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 5

# --- Raw features (no PCA) ---
raw_features:
  dir: Data/algonauts_2025.features
  sample_freq: 0.6711
  layer_aggregation: mean
  modalities:
    video:
      subdir: vjepa2_avg_feat
      dim: 1408
    audio:
      subdir: whisper
      dim: 1280
    text:
      subdir: Llama-3.2-3B
      dim: 3072
    omni:
      subdir: qwen-2-5-omni-7b
      dim: 3584

# Precomputed NPY features
raw_features_npy_dir: Data/raw_features_npy

# --- Single subject ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Sliding window (Many-to-One) ---
# Each sample: 10 past TRs + 1 current TR of features → 1 fMRI latent
sliding_window:
  feature_context_trs: 10    # 10 past TRs of features
  stride: 1                  # slide by 1 TR
  temporal_jitter: 2

# --- DataLoader ---
dataloader:
  batch_size: 256
  val_batch_size: 256
  num_workers: 4
  pin_memory: true

# =====================================================================
# BrainFlow model config
# =====================================================================
brainflow:
  output_dim: 1000             # direct fMRI output (no VAE)

  # Encoder: Temporal Fusion (11 TRs → 1 context vector)
  encoder:
    hidden_dim: 512
    n_layers: 4
    n_heads: 8
    dropout: 0.3
    modality_dropout: 0.3
    projector_depth: 2

  # Velocity net: DiT-1D (Patch-based Transformer)
  velocity_net:
    type: dit1d
    d_model: 256
    n_heads: 8
    n_layers: 4
    patch_size: 20       # 1000 / 20 = 50 patches
    time_dim: 256
    dropout: 0.15

  cfm:
    solver: euler
    sigma_min: 0.0001

  cfg_drop_prob: 0.05

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 200
  lr: 1.0e-4
  weight_decay: 0.05
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5
  guidance_scale: 1.0
  ema_decay: 0.999
  # Data augmentation
  latent_noise_scale: 0.05
  mixup_alpha: 0.2

# =====================================================================
# Encoder pre-training config (Stage 1)
# =====================================================================
pretrain:
  n_epochs: 50
  lr: 2.0e-4
  pcc_weight: 0.1
  val_every_n_epochs: 5
  head_hidden_mult: 1
  head_dropout: 0.1
  head_weight_decay: 0.1
  encoder_dropout: 0.15
  modality_dropout: 0.15
  early_stop_patience: 15
  min_lr: 1.0e-6

# --- Output ---
output_dir: outputs/brainflow
