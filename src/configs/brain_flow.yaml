# =====================================================================
# BrainFlow Stage 2 CFM Model Config
# =====================================================================
# Learns to generate fMRI VAE latents from multimodal PCA features.
# Run: python src/train_brain_flow.py --config src/configs/brain_flow.yaml
# =====================================================================

data_root: Data
latent_dir: Data/latents_64
vae_checkpoint: outputs/fmri_vae_64/best.pt

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5

pca_features:
  output_dir: Data/pca_features
  n_components: 512

features:
  dir: features
  npy_dir: features_npy_cat
  npy_only: true
  sample_freq: 2.0
  layer_aggregation: cat
  modalities:
    video:
      subdir: video
      file_pattern: "{movie_type}_{stimulus_type}_features_vjepa2.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_vjepa2"
      h5_key: video
      dim: 5632
    audio:
      subdir: audio
      file_pattern: "{movie_type}_{stimulus_type}_features_w2vbert.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_w2vbert"
      h5_key: audio
      dim: 4096
    text:
      subdir: text
      file_pattern: "{movie_type}_{stimulus_type}_features_llama3.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_llama3"
      h5_key: text
      dim: 12288
    omni:
      subdir: omni
      file_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni.h5"
      npy_pattern: "{movie_type}_{stimulus_type}_features_qwen_omni"
      h5_key: omni
      data_format: tr_tokens_dim
      dim: 3584
      keep_tokens: false

# --- Single subject ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5, s6]
    test: [s7]
  movie10:
    train: [all]
    test: []

val_ratio: 0.1

sliding_window:
  context_duration: 14.9
  stride: 1.49

# --- Preprocessing ---
preprocessing:
  fmri:
    standardize: none

# --- DataLoader ---
dataloader:
  batch_size: 128
  val_batch_size: 128
  num_workers: 0
  pin_memory: true
  max_cache_size: 50

# =====================================================================
# BrainFlow CFM config
# =====================================================================
brainflow:
  latent_dim: 64           # MUST MATCH VAE
  feat_dim: 2750           # MUST MATCH PCA n_components
  
  # ConditionEncoder params
  encoder:
    hidden_dim: 512
    n_layers: 2            # Transformer layers
    n_heads: 8
    dropout: 0.1
    
  # Decoder (UNet-1D) params (from Matcha-TTS)
  decoder:
    channels: [256, 256]
    dropout: 0.05
    attention_head_dim: 64
    n_blocks: 1
    num_mid_blocks: 2
    num_heads: 4
    act_fn: snakebeta
    
  cfm:
    solver: euler
    sigma_min: 0.0001

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 500
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5

# --- Output ---
output_dir: outputs/brain_flow_cfm
