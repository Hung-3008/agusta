# =====================================================================
# BrainFlow Direct v2 — CSFM + Strong Regularization
# =====================================================================
# Changes from csfm.yaml:
#   - modality_dropout: 0.3 → 0.5  (reduce language dependency)
#   - dropout: 0.1 → 0.2           (stronger velocity net regularization)
#   - kld_weight: 1.0 → 0.05       (don't over-constrain variance)
#   - source_noise_std: 0.5 → 0.0  (clean ODE trajectory)
#   - weight_decay: 0.01 → 0.05    (stronger L2 regularization)
#   - cfg_dropout_prob: 0.1 → 0.15 (more unconditional training)
#   - temporal_jitter: 2 → 3       (more temporal augmentation)
# =====================================================================

data_root: Data

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 2
  use_global_stats: true

# --- Pre-extracted encoder context latents (8 modalities) ---
context_latent_dirs:
  - Data/features_npy_pooled/vjepa2_avg_feat       # Visual (V-JEPA 2)
  - Data/features_npy_pooled/whisper                # Audio (Whisper)
  - Data/features_npy_pooled/Llama-3.2-1B           # Text (LLaMA-1B)
  - Data/features_npy_pooled/Llama-3.2-3B           # Text (LLaMA-3B)
  - Data/features_npy_pooled/qwen2-5_3B             # Text (Qwen2.5-3B)
  - Data/features_npy_pooled/qwen-2-5-omni-7b       # Multimodal (Qwen-Omni)
  - Data/features_npy_pooled/internvl3_8b_8bit      # Vision-Language (InternVL3-8B)
  - Data/features_npy_pooled/InternVL3_14B          # Vision-Language (InternVL3-14B)

modality_dims:
  - 1408   # vjepa2_avg_feat
  - 1280   # whisper
  - 2048   # Llama-3.2-1B
  - 3072   # Llama-3.2-3B
  - 2048   # qwen2-5_3B
  - 3584   # qwen-2-5-omni-7b
  - 3584   # internvl3_8b_8bit
  - 5120   # InternVL3_14B

# --- Multi-subject training ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Sliding window ---
sliding_window:
  feature_context_trs: 10
  stride: 1
  temporal_jitter: 3       # ← 2 → 3 (more temporal augmentation)

# --- DataLoader ---
dataloader:
  batch_size: 1024
  val_batch_size: 1024
  num_workers: 4
  pin_memory: true

# =====================================================================
# Model config
# =====================================================================
brainflow:
  output_dim: 1000
  source_mode: "csfm"

  velocity_net:
    output_dim: 1000
    hidden_dim: 1024
    n_blocks: 8
    n_heads: 8
    dropout: 0.2              # ← 0.1 → 0.2 (stronger regularization)
    modality_dropout: 0.5     # ← 0.3 → 0.5 (reduce language dependency)
    cross_modal_n_layers: 2
    max_seq_len: 11

  source_predictor:
    use_variational: true
    align_weight: 1.0
    align_loss_type: "normalized_l2"
    kld_weight: 0.05          # ← 1.0 → 0.05 (don't over-constrain σ)
    source_noise_std: 0.0     # ← 0.5 → 0.0 (clean ODE trajectory)

# =====================================================================
# Solver args (validation inference)
# =====================================================================
solver_args:
  method: euler
  time_points: 20

# =====================================================================
# Training
# =====================================================================
training:
  n_epochs: 200
  lr: 1.0e-4
  weight_decay: 0.05          # ← 0.01 → 0.05 (stronger L2 reg)
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5
  ema_decay: 0.999
  cfg_dropout_prob: 0.15      # ← 0.1 → 0.15 (more unconditional training)

# --- Output ---
output_dir: outputs/brainflow_direct_v2_csfm_reg
