# =====================================================================
# BrainFlow v2 — TRIBE-style Encoder + DiT Decoder
# =====================================================================
# No PCA: operates on raw features from algonauts_2025.features/
# DiT decoder with AdaLN-Zero + cross-attention (also supports U-Net).
# Run: python src/train_brain_flow_v2.py --config src/configs/brain_flow_v2.yaml
# =====================================================================

data_root: Data
latent_dir: Data/latents_vae64
vae_checkpoint: outputs/fmri_vae_64/best.pt

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 3              # ~4.5s delay (baseline uses 3 TRs)

# --- Raw features (no PCA) ---
raw_features:
  dir: Data/algonauts_2025.features
  sample_freq: 2.0
  layer_aggregation: mean      # mean of all valid layers (simple, robust)
  modalities:
    video:
      subdir: vjepa2_avg_feat
      dim: 1408                # V-JEPA2 ViT-G single-layer dim
    audio:
      subdir: whisper
      dim: 1280                # Whisper/Wav2Vec-BERT
    text:
      subdir: Llama-3.2-3B
      dim: 3072                # Llama-3.2-3B hidden dim
    omni:
      subdir: qwen-2-5-omni-7b
      dim: 3584                # Qwen2.5-Omni hidden dim

# Precomputed NPY features (run precompute_raw_features.py first)
raw_features_npy_dir: Data/raw_features_npy

# --- Single subject ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

sliding_window:
  context_duration: 149.0   # 100 TRs
  stride: 149.0             # no overlap

# --- DataLoader ---
dataloader:
  batch_size: 8
  val_batch_size: 8
  num_workers: 0             # start with 0 for H5 reads
  pin_memory: true

# =====================================================================
# BrainFlow v2 model config
# =====================================================================
brainflow:
  latent_dim: 64            # Actual VAE latent dimension

  # Encoder: TRIBE-style (per-modality MLP + Transformer)
  encoder:
    hidden_dim: 768          # Transformer d_model
    n_layers: 4              # Transformer layers
    n_heads: 8
    dropout: 0.1
    modality_dropout: 0.2    # TRIBE uses 0.3

  # Decoder: DiT or unet
  decoder_type: dit          # "dit" or "unet"

  # DiT decoder params
  decoder:
    hidden_dim: 256          # DiT block hidden dim
    n_blocks: 6              # DiT blocks
    n_heads: 8
    dropout: 0.1
    use_cross_attention: true

  cfm:
    solver: euler
    sigma_min: 0.0001

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 500
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5

# --- Output ---
output_dir: outputs/brain_flow_v2_dit
