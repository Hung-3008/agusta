# =====================================================================
# BrainFlow v2 — TRIBE-style Encoder + DiT Decoder
# =====================================================================
# No PCA: operates on raw features from algonauts_2025.features/
# DiT decoder with AdaLN-Zero + cross-attention (also supports U-Net).
# Run: python src/train_brain_flow_v2.py --config src/configs/brain_flow_v2.yaml
# =====================================================================

data_root: Data
latent_dir: Data/latents_vae64
vae_checkpoint: outputs/fmri_vae_64/best.pt

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 5              # ~7.5s delay (5 TRs × 1.49s, closer to HRF peak at 5-6s)

# --- Raw features (no PCA) ---
raw_features:
  dir: Data/algonauts_2025.features
  sample_freq: 0.6711          # ~1/TR Hz (features are at ~1 sample per raw fMRI TR)
  layer_aggregation: mean      # mean-pool across layers (fast I/O, smaller dims)
  modalities:
    video:
      subdir: vjepa2_avg_feat
      dim: 1408                # V-JEPA2 ViT-G (mean of 13 layers)
    audio:
      subdir: whisper
      dim: 1280                # Whisper (mean of 4 layers)
    text:
      subdir: Llama-3.2-3B
      dim: 3072                # Llama-3.2-3B (mean of 5 layers)
    omni:
      subdir: qwen-2-5-omni-7b
      dim: 3584                # Qwen2.5-Omni (mean of 9 layers)

# Precomputed NPY features (run precompute_raw_features.py first)
raw_features_npy_dir: Data/raw_features_npy

# --- Single subject ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

sliding_window:
  context_duration: 14.9    # 10 TRs — fMRI output window
  stride: 14.9              # 10 TR stride — 0% overlap
  feature_context_trs: 20   # Extra past TRs of features loaded per window (causal context)
  temporal_jitter: 2        # Random ±2 TR offset on features (train only, diversity)

# --- DataLoader ---
dataloader:
  batch_size: 256
  val_batch_size: 256
  num_workers: 4
  pin_memory: true

# =====================================================================
# BrainFlow v2 model config
# =====================================================================
brainflow:
  latent_dim: 64            # Actual VAE latent dimension

  # Encoder: TRIBE-style (per-modality MLP + Transformer)
  encoder:
    hidden_dim: 512          # Transformer d_model
    n_layers: 4              # Transformer layers
    n_heads: 8
    dropout: 0.3             # Increased from 0.2 for regularization
    modality_dropout: 0.3
    projector_depth: 3       # Deep MLP projector per modality (default was 1)

  # Decoder: DiT or unet
  decoder_type: dit

  # DiT decoder params
  decoder:
    hidden_dim: 384          # DiT block hidden dim
    n_blocks: 6
    n_heads: 6
    dropout: 0.3             # Increased from 0.2 for regularization
    use_cross_attention: false

  cfm:
    solver: euler
    sigma_min: 0.0001
    
  cfg_drop_prob: 0.1

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 200              # Reduced from 300 (early stopping anyway)
  lr: 1.0e-4
  weight_decay: 0.2          # Increased from 0.1 for regularization
  warmup_ratio: 0.05
  min_lr: 1.0e-6             # Cosine schedule minimum LR
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 10
  guidance_scale: 1.5
  ema_decay: 0.999            # EMA weight smoothing
  # Prior loss (Matcha-TTS style): push mu → target latent
  prior_weight_start: 1.0     # Phase 1: strong prior focus
  prior_weight_end: 0.1       # Phase 2: mostly flow matching
  prior_anneal_epochs: 100    # Anneal over first N epochs
  # Data augmentation
  latent_noise_scale: 0.05    # Gaussian noise on target latents (VAE sampling sim)
  mixup_alpha: 0.2            # Beta distribution α for mixup (0=off)
  reg_weight: 0.1             # Direct fMRI regression loss weight (auxiliary)

# --- Output ---
output_dir: outputs/brain_flow_v2_new_cond_fixed
