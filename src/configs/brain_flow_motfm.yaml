# =====================================================================
# BrainFlow MOTFM — Flow Matching with MONAI UNet backbone
# =====================================================================
# Architecture adapted from MOTFM (Medical Optimal Transport Flow Matching).
# Uses MONAI DiffusionModelUNet (spatial_dims=2) with pseudo-2D fMRI (32x32).
# Uses Meta flow_matching library for OT-CFM path + ODE solver.
#
# Run: python src/train_brainflow_motfm.py --config src/configs/brain_flow_motfm.yaml
# =====================================================================

data_root: Data
latent_dir: Data/latents_vae64
vae_checkpoint: outputs/fmri_vae_64/best.pt

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 5

# --- Raw features (no PCA) ---
raw_features:
  dir: Data/algonauts_2025.features
  sample_freq: 0.6711
  layer_aggregation: mean
  modalities:
    video:
      subdir: vjepa2_avg_feat
      dim: 1408
    audio:
      subdir: whisper
      dim: 1280
    text:
      subdir: Llama-3.2-3B
      dim: 3072
    omni:
      subdir: qwen-2-5-omni-7b
      dim: 3584

# Precomputed NPY features
raw_features_npy_dir: Data/raw_features_npy

# --- Single subject ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

# --- Sliding window (Many-to-One) ---
sliding_window:
  feature_context_trs: 10
  stride: 1
  temporal_jitter: 2

# --- DataLoader ---
dataloader:
  batch_size: 256
  val_batch_size: 256
  num_workers: 4
  pin_memory: true

# =====================================================================
# BrainFlow MOTFM model config
# =====================================================================
brainflow:
  output_dim: 1000

  # Encoder: Temporal Fusion (11 TRs → 1 context vector)
  encoder:
    hidden_dim: 1024
    n_layers: 6
    n_heads: 8
    dropout: 0.3
    modality_dropout: 0.3
    projector_depth: 2

  # UNet velocity network (adapted from MOTFM)
  # fMRI (1000) → pad to 1024 → reshape (1, 32, 32) pseudo-2D
  unet:
    spatial_dims: 2
    in_channels: 1
    out_channels: 1
    num_res_blocks: [2, 2, 2, 2]
    num_channels: [64, 128, 256, 512]
    attention_levels: [False, False, True, True]
    norm_num_groups: 32
    num_head_channels: [64, 128, 256, 512]
    transformer_num_layers: 2
    with_conditioning: true
    cross_attention_dim: 1024   # must match encoder hidden_dim
    max_timestep: 1000

  cfg_drop_prob: 0.05

# =====================================================================
# Solver args (for validation sampling)
# =====================================================================
solver_args:
  method: midpoint
  time_points: 50

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 200
  lr: 1.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5
  guidance_scale: 1.0
  ema_decay: 0.999
  # Data augmentation
  mixup_alpha: 0.2

# =====================================================================
# Encoder pre-training config (Stage 1) — optional
# =====================================================================
pretrain:
  n_epochs: 50
  lr: 2.0e-4
  pcc_weight: 0.1
  val_every_n_epochs: 5
  head_hidden_mult: 4
  head_dropout: 0.1
  head_weight_decay: 0.0
  encoder_dropout: 0.15
  modality_dropout: 0.15
  early_stop_patience: 15
  min_lr: 1.0e-6

# --- Output ---
output_dir: outputs/brainflow_motfm
