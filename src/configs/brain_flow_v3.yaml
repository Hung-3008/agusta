# =====================================================================
# BrainFlow v3 — Direct Regression (TRIBE-inspired)
# =====================================================================
# No VAE, no CFM. Direct regression from multimodal features to fMRI.
# Run: python src/train_brain_flow_v3.py --config src/configs/brain_flow_v3.yaml
# =====================================================================

data_root: Data
vae_checkpoint: null   # No VAE needed

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 3

# --- Raw features ---
raw_features:
  dir: Data/algonauts_2025.features
  sample_freq: 0.6711
  layer_aggregation: mean
  modalities:
    video:
      subdir: vjepa2_avg_feat
      dim: 1408
    audio:
      subdir: whisper
      dim: 1280
    text:
      subdir: Llama-3.2-3B
      dim: 3072
    omni:
      subdir: qwen-2-5-omni-7b
      dim: 3584

# Precomputed NPY features
raw_features_npy_dir: Data/raw_features_npy

# --- Multi-subject training ---
subjects:
  - sub-01
  - sub-02
  - sub-03
  - sub-05

subject_mode: multi

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

sliding_window:
  context_duration: 149.0   # 100 TRs
  stride: 74.5              # 50% overlap for more training data

# --- DataLoader ---
dataloader:
  batch_size: 128
  val_batch_size: 128
  num_workers: 4
  pin_memory: true

# =====================================================================
# BrainFlow v3 model config
# =====================================================================
brainflow:
  n_voxels: 1000
  n_subjects: 4

  # Encoder: TRIBE-style (per-modality MLP + Transformer)
  encoder:
    hidden_dim: 1024
    n_layers: 8
    n_heads: 8
    dropout: 0.1
    modality_dropout: 0.3

  # Regression head
  head:
    subject_embed_dim: 64
    dropout: 0.1

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 200
  lr: 5.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.05
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 5
  pcc_weight: 0.1         # Weight for PCC loss component (reduced: was dominating MSE)
  pcc_warmup_epochs: 50   # Start PCC loss after MSE converges well

# --- Output ---
output_dir: outputs/brain_flow_v3
