# =====================================================================
# BrainFlow v3 — Deep-Flow Inspired Architecture
# =====================================================================
# Early Fusion Encoder + Residual MLP velocity net (concat conditioning)
# No Latent-CFM. Operates on raw features + VAE latents.
# Run: python src/train_brain_flow_v3.py --config src/configs/brain_flow_v3.yaml
# =====================================================================

data_root: Data
latent_dir: Data/latents_vae64
vae_checkpoint: outputs/fmri_vae_64/best.pt

fmri:
  dir: algonauts_2025.competitors/fmri
  tr: 1.49
  n_voxels: 1000
  excluded_samples_start: 5
  excluded_samples_end: 5
  hrf_delay: 5

# --- Raw features (no PCA) ---
raw_features:
  dir: Data/algonauts_2025.features
  sample_freq: 0.6711
  layer_aggregation: mean
  modalities:
    video:
      subdir: vjepa2_avg_feat
      dim: 1408
    audio:
      subdir: whisper
      dim: 1280
    text:
      subdir: Llama-3.2-3B
      dim: 3072
    omni:
      subdir: qwen-2-5-omni-7b
      dim: 3584

# Precomputed NPY features
raw_features_npy_dir: Data/raw_features_npy

# --- Single subject ---
subjects:
  - sub-01

subject_mode: single

# --- Splits ---
splits:
  friends:
    train: [s1, s2, s3, s4, s5]
    val: [s6]
  movie10:
    train: [bourne, figures, life, wolf]
    val: []

sliding_window:
  context_duration: 14.9
  stride: 14.9
  feature_context_trs: 20
  temporal_jitter: 2

# --- DataLoader ---
dataloader:
  batch_size: 256
  val_batch_size: 256
  num_workers: 4
  pin_memory: true

# =====================================================================
# BrainFlow v3 model config
# =====================================================================
brainflow:
  latent_dim: 64

  # Encoder: Early Fusion (Deep-Flow style)
  encoder:
    hidden_dim: 512
    n_layers: 4
    n_heads: 8
    dropout: 0.3
    modality_dropout: 0.3
    projector_depth: 2

  # Velocity net: U-DiT 1D (Scaled Capacity)
  velocity_net:
    hidden_dim: 384    # Scaled to ~24M params (perfectly matches Encoder)
    n_layers: 4        # Creates 4 down + 1 mid + 4 up = 9 blocks
    n_heads: 8
    time_dim: 256
    dropout: 0.1

  cfm:
    solver: euler
    sigma_min: 0.0001

  cfg_drop_prob: 0.1

# =====================================================================
# Training config
# =====================================================================
training:
  n_epochs: 200
  lr: 1.0e-4
  weight_decay: 0.2
  warmup_ratio: 0.05
  min_lr: 1.0e-6
  grad_clip: 1.0
  use_amp: true
  log_every_n_steps: 20
  val_every_n_epochs: 10
  guidance_scale: 1.5
  ema_decay: 0.999
  # Data augmentation
  latent_noise_scale: 0.05
  mixup_alpha: 0.2

# --- Output ---
output_dir: outputs/brain_flow_v3
